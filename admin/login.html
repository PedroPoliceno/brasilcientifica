<!DOCTYPE html>
<html lang="pt-BR" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Admin | Brasil Científica</title>
  <meta name="robots" content="noindex, nofollow" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       TELA DE LOGIN (única coisa nesta página)
  ════════════════════════════════════════════ -->
  <div id="tela-login" class="login-wrap">
    <div class="login-card">
      <img src="../images/logo/logo_header.png" alt="Brasil Científica" class="login-logo" />
      <h1 class="login-titulo">Painel Administrativo</h1>
      <p class="login-subtitulo">Entre com suas credenciais para continuar</p>

      <div id="login-erro" class="alerta alerta--erro" hidden></div>

      <div class="campo">
        <label for="login-email" class="campo__label">E-mail</label>
        <input id="login-email" type="email" class="campo__input" placeholder="seu@email.com" autocomplete="email" />
      </div>
      <div class="campo">
        <label for="login-senha" class="campo__label">Senha</label>
        <input id="login-senha" type="password" class="campo__input" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button id="btn-login" class="btn-primario btn-primario--full" type="button">
        <i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i> Entrar
      </button>
    </div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
